<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Net Worth Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;scrollbar-width:none;-ms-overflow-style:none;}
  *::-webkit-scrollbar{display:none;}
  :root{
    --bg:#ffffff;--bg2:#f5f5f3;
    --text:#1a1a1a;--text2:#666;
    --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
    --green:#0f6e56;--red:#a32d2d;--amber:#854f0b;
    --radius:10px;--radius-sm:7px;
    --mono:'Courier New',monospace;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1e;--bg2:#2c2c2e;
      --text:#f0f0f0;--text2:#aaa;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
      --green:#5dcaa5;--red:#f09595;--amber:#ef9f27;
    }
  }
  html,body{scrollbar-width:none;-ms-overflow-style:none;}
  html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:700px;margin:0 auto;padding:20px 16px 60px;}
  h1{font-size:20px;font-weight:600;margin-bottom:16px;}
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;}
  .tab{padding:8px 14px;font-size:13px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--text2);font-family:inherit;margin-bottom:-1px;white-space:nowrap;}
  .tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
  .card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;}
  .card-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
  .card-value{font-size:20px;font-weight:600;font-family:var(--mono);}
  .card-sub{font-size:11px;color:var(--text2);margin-top:3px;font-family:var(--mono);}
  .green{color:var(--green);}
  .red{color:var(--red);}
  .section-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 7px;}
  .list{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);}
  .list-row:last-child{border-bottom:none;}
  .row-right{display:flex;align-items:center;gap:10px;}
  .row-val{font-size:13px;font-family:var(--mono);color:var(--text);}
  .row-diff{font-size:11px;font-family:var(--mono);}
  .entry-bar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;background:var(--bg2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;}
  .field label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
  input[type=date],input[type=number],input[type=text],select{
    background:var(--bg);border:1px solid var(--border2);border-radius:6px;
    color:var(--text);font-family:inherit;padding:6px 10px;font-size:13px;outline:none;
  }
  input:focus,select:focus{border-color:#1D9E75;}
  input[type=number]{width:110px;text-align:right;font-family:var(--mono);}
  .live-total-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
  .live-total{font-size:18px;font-weight:600;font-family:var(--mono);color:var(--text);}
  button.primary{background:#1D9E75;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  button.primary:hover{background:#0f6e56;}
  button.warn{background:transparent;border:1px solid var(--amber);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--amber);cursor:pointer;font-family:inherit;}
  button.warn:hover{background:var(--amber);color:#fff;}
  button.danger{background:transparent;border:1px solid var(--red);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--red);cursor:pointer;font-family:inherit;}
  button.danger:hover{background:var(--red);color:#fff;}
  button.ghost{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;}
  button.ghost:hover{color:var(--text);}
  .empty{text-align:center;padding:40px 16px;color:var(--text2);}
  .empty p{margin-bottom:14px;font-size:14px;}
  .chart-wrap{position:relative;width:100%;height:220px;margin-bottom:20px;}
  .badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;margin-left:6px;vertical-align:middle;}
  .badge-archived{background:rgba(133,79,11,0.12);color:var(--amber);}

  /* Manage tab */
  .mgmt-header{display:grid;grid-template-columns:1fr 140px 60px 120px;gap:8px;padding:6px 14px;
    background:var(--bg2);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;}
  .mgmt-header span{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
  .mgmt-row{display:grid;grid-template-columns:1fr 140px 60px 120px;gap:8px;align-items:start;
    padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-top:none;}
  .mgmt-row:last-child{border-radius:0 0 8px 8px;}
  .mgmt-row input[type=text],.mgmt-row select{min-width:0;width:100%;}
  .archived-row{background:var(--bg2);opacity:0.8;}
  .liq-wrap{display:flex;flex-direction:column;align-items:center;padding-top:5px;gap:3px;}
  .liq-wrap span{font-size:10px;color:var(--text2);}
  .liq-toggle{position:relative;display:inline-block;width:34px;height:20px;cursor:pointer;flex-shrink:0;}
  .liq-toggle input{opacity:0;width:0;height:0;position:absolute;}
  .liq-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--border2);border-radius:20px;transition:.2s;cursor:pointer;}
  .liq-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s;}
  .liq-toggle input:checked+.liq-slider{background:#1D9E75;}
  .liq-toggle input:checked+.liq-slider:before{transform:translateX(14px);}
  .badge-liquid{background:rgba(15,110,86,0.1);color:var(--green);}
  .add-form{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-top:4px;display:flex;flex-direction:column;gap:10px;}
  .add-row{display:flex;gap:8px;flex-wrap:wrap;}
  .add-row input,.add-row select{flex:1;min-width:120px;}
  .msg{font-size:12px;padding:7px 10px;border-radius:6px;margin-bottom:10px;}
  .msg.ok{background:rgba(15,110,86,0.1);color:var(--green);}
  .msg.err{background:rgba(163,45,45,0.1);color:var(--red);}
  .msg.warn{background:rgba(133,79,11,0.1);color:var(--amber);}
  .warn-box{background:rgba(133,79,11,0.08);border:1px solid rgba(133,79,11,0.25);border-radius:8px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:var(--amber);display:none;}
  .warn-box b{font-weight:600;}
</style>
</head>

// Sum ALL values in an entry (active + archived) — keeps totals accurate forever

};

function load(){
  try{const d=localStorage.getItem('nw_entries');if(d)entries=JSON.parse(d);}catch(e){entries=[];}
  try{
    const a=localStorage.getItem('nw_accounts');
    accounts=a?JSON.parse(a):JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
    // backfill archived and liquid flags for older saved data
    accounts.forEach(a=>{
      if(a.archived===undefined) a.archived=false;
      if(a.liquid===undefined) a.liquid=false;
    });
    // if entries is empty, seed from imported history
    if(entries.length===0){
      entries=JSON.parse(JSON.stringify(IMPORTED_ENTRIES));
      persist();
    }
    if(accounts.length===0){
      accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
      persistAccounts();
    }
  }catch(e){accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));}
}
function persist(){try{localStorage.setItem('nw_entries',JSON.stringify(entries));}catch(e){}}
function persistAccounts(){try{localStorage.setItem('nw_accounts',JSON.stringify(accounts));}catch(e){}}
function initFV(){
  const last=entries.length?entries[entries.length-1]:null;
  fv={};
  activeAccounts().forEach(a=>{fv[a.name]=last?(last.values[a.name]||0):0;});
}

function switchTab(t){
  const TABS=['dashboard','enter','history','manage'];
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',TABS[i]===t));
  TABS.forEach(name=>$('pane-'+name).style.display=name===t?'block':'none');
  if(t==='enter'&&currentTab!=='enter')fv={};
  currentTab=t;
  if(t==='dashboard')renderDash();
  else if(t==='enter')renderEnter();
  else if(t==='history')renderHist();
  else renderManage();
}

/* ─────────────────────────────────────────
   Dashboard
───────────────────────────────────────── */
function renderDash(){
  const el=$('pane-dashboard');
  if(!entries.length){
    el.innerHTML=`<div class="empty"><p>No entries yet</p><button class="primary" onclick="switchTab('enter')">Enter first values</button></div>`;
    return;
  }
  const last=entries[entries.length-1],prev=entries.length>=2?entries[entries.length-2]:null;
  const total=sumE(last),diff=prev?total-sumE(prev):null,pct=prev&&sumE(prev)?(total-sumE(prev))/sumE(prev)*100:null;
  const liquidTotal=accounts.filter(a=>a.liquid&&!a.archived).reduce((s,a)=>s+(last.values[a.name]||0),0);
  const liquidPrev=prev?accounts.filter(a=>a.liquid&&!a.archived).reduce((s,a)=>s+(prev.values[a.name]||0),0):null;
  const liquidDiff=liquidPrev!==null?liquidTotal-liquidPrev:null;

  let html=`<div class="cards">
    <div class="card"><div class="card-label">Net worth</div><div class="card-value">${fmt(total)}</div></div>`;
  if(diff!==null){
    html+=`<div class="card"><div class="card-label">Since last entry</div><div class="card-value ${diff>=0?'green':'red'}">${fmtD(diff)}</div><div class="card-sub">${diff>=0?'+':''}${pct.toFixed(1)}%</div></div>`;
  }else{
    html+=`<div class="card"><div class="card-label">Entries</div><div class="card-value">${entries.length}</div></div>`;
  }
  html+=`<div class="card"><div class="card-label">Last updated</div><div class="card-value" style="font-size:14px;padding-top:4px">${last.date}</div><div class="card-sub" style="font-family:inherit">${entries.length} entr${entries.length===1?'y':'ies'}</div></div>
  <div class="card"><div class="card-label">Liquid assets</div><div class="card-value" style="color:var(--green)">${fmt(liquidTotal)}</div>${liquidDiff!==null&&liquidDiff!==0?`<div class="card-sub ${liquidDiff>=0?'green':'red'}" style="color:${liquidDiff>=0?'var(--green)':'var(--red)'}">${fmtD(liquidDiff)}</div>`:''}</div>
  </div>`;

  // Active category breakdown
  html+=`<div class="section-label">By category</div><div class="list">`;
  getCats().forEach(cat=>{
    const accs=activeAccounts().filter(a=>a.cat===cat);
    const val=accs.reduce((s,a)=>s+(last.values[a.name]||0),0);
    const pval=prev?accs.reduce((s,a)=>s+(prev.values[a.name]||0),0):null;
    const cd=pval!==null?val-pval:null;
    html+=`<div class="list-row"><span style="font-size:13px">${esc(cat)}</span><div class="row-right">${cd!==null&&cd!==0?`<span class="row-diff ${cd>=0?'green':'red'}">${fmtD(cd)}</span>`:''}<span class="row-val">${fmt(val)}</span></div></div>`;
  });
  html+=`</div>`;

  // Archived accounts — only show if any have non-zero value in latest entry
  const archivedWithValue=archivedAccounts().filter(a=>(last.values[a.name]||0)>0);
  if(archivedWithValue.length>0){
    const archivedTotal=archivedWithValue.reduce((s,a)=>s+(last.values[a.name]||0),0);
    const archivedPrevTotal=prev?archivedWithValue.reduce((s,a)=>s+(prev.values[a.name]||0),0):null;
    const acd=archivedPrevTotal!==null?archivedTotal-archivedPrevTotal:null;
    html+=`<div class="section-label">Archived accounts <span style="font-size:10px;font-weight:400;color:var(--text2)">(still in totals — not yet zeroed out)</span></div><div class="list">`;
    archivedWithValue.forEach(a=>{
      const val=last.values[a.name]||0;
      const pval=prev?(prev.values[a.name]||0):null;
      const cd=pval!==null?val-pval:null;
      html+=`<div class="list-row" style="opacity:.75"><span style="font-size:13px;color:var(--text2)">${esc(a.name)} <span class="badge badge-archived">archived</span></span><div class="row-right">${cd!==null&&cd!==0?`<span class="row-diff ${cd>=0?'green':'red'}">${fmtD(cd)}</span>`:''}<span class="row-val">${fmt(val)}</span></div></div>`;
    });
    html+=`</div>`;
  }

  el.innerHTML=html;
}

function renderEnter(){
  if(!Object.keys(fv).length)initFV();
  const total=Object.values(fv).reduce((a,b)=>a+b,0);
  const today=new Date().toISOString().split('T')[0];
  const el=$('pane-enter');
  let html=`<div class="entry-bar">
    <div class="field"><label>Date</label><input type="date" id="edate" value="${today}"/></div>
    <div><div class="live-total-label">Running total</div><div class="live-total" id="live-total">${fmt(total)}</div></div>
    <div style="margin-left:auto;align-self:flex-end"><button class="primary" onclick="saveEntry()">Save entry</button></div>
  </div>`;
  getCats().forEach(cat=>{
    const accs=activeAccounts().filter(a=>a.cat===cat);
    if(!accs.length)return;
    html+=`<div class="section-label">${esc(cat)}</div><div class="list">`;
    accs.forEach(a=>{
      const id='inp-'+a.name.replace(/[^a-z0-9]/gi,'-');
      html+=`<div class="list-row"><label for="${id}" style="font-size:13px">${esc(a.name)}</label><div class="row-right"><span style="font-size:13px;color:var(--text2)">$</span><input type="number" id="${id}" data-acc="${esc(a.name)}" value="${fv[a.name]||0}" min="0" step="1" oninput="onInput(this)"/></div></div>`;
    });
    html+=`</div>`;
  });
  if(!activeAccounts().length){
    html+=`<div class="empty"><p>No active accounts. Add or restore accounts in Manage accounts.</p></div>`;
  }
  el.innerHTML=html;
}

function renderHist(){
  const el=$('pane-history');
  if(!entries.length){el.innerHTML=`<div class="empty"><p>No entries yet.</p></div>`;return;}
  let html=`<div class="chart-wrap"><canvas id="histChart" role="img" aria-label="Net worth over time">Net worth over time.</canvas></div>
  <div class="section-label">All entries</div><div class="list">`;
  [...entries].reverse().forEach((entry,i)=>{
    const idx=entries.length-1-i,prev=idx>0?entries[idx-1]:null;
    const total=sumE(entry),diff=prev?total-sumE(prev):null;
    html+=`<div class="list-row"><span style="font-size:13px">${entry.date}</span><div class="row-right">${diff!==null?`<span class="row-diff ${diff>=0?'green':'red'}">${fmtD(diff)}</span>`:''}<span class="row-val">${fmt(total)}</span></div></div>`;
  });
  html+=`</div><div style="margin-top:12px;display:flex;justify-content:flex-end"><button class="danger" id="del-btn" onclick="delLast()">Delete last entry</button></div>`;
  el.innerHTML=html;
  renderChart();
}

  if(histChart){histChart.destroy();histChart=null;}
  const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  histChart=new Chart(ctx,{type:'line',data:{labels:entries.map(e=>e.date),datasets:[{label:'Net worth',data:entries.map(sumE),borderColor:'#1D9E75',backgroundColor:dark?'rgba(29,158,117,0.12)':'rgba(29,158,117,0.08)',fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:'#1D9E75',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},scales:{y:{ticks:{callback:v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v,font:{size:11},color:dark?'#888':'#666'},grid:{color:dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)'}},x:{ticks:{font:{size:11},maxRotation:45,color:dark?'#888':'#666',autoSkip:true,maxTicksLimit:8},grid:{display:false}}}}});
}

/* ─────────────────────────────────────────
   Manage accounts
───────────────────────────────────────── */
function catSelectHtml(selected){
  const cats=getCats();
  if(cats.length===0) return `<option value="__new__">+ New category</option>`;
  return cats.map(c=>`<option value="${c}"${c===selected?' selected':''}>${esc(c)}</option>`).join('')
    +`<option value="__new__">+ New category...</option>`;
}

function renderManage(){
  const el=$('pane-manage');
  const active=activeAccounts();
  const archived=archivedAccounts();
  const noCats=getCats().length===0;

  let html=`<div id="manage-msg"></div>
  <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Changes save automatically. Archive accounts you no longer use — history is always preserved.</p>`;

  /* ── Active accounts ── */
  if(active.length===0){
    html+=`<div class="empty" style="padding:20px 0"><p>No active accounts.</p></div>`;
  }else{
    html+=`<div class="mgmt-header"><span>Account name</span><span>Category</span><span>Liquid</span><span></span></div>`;
    accounts.forEach((a,idx)=>{
      if(a.archived)return;
      html+=`<div class="mgmt-row" id="mgmt-${idx}">
        <input type="text" value="${esc(a.name)}" data-idx="${idx}" class="name-inp"
          onblur="handleNameBlur(this)" onkeydown="if(event.key==='Enter')this.blur()"/>
        <div style="display:flex;flex-direction:column;gap:4px">
          <select data-idx="${idx}" class="cat-sel" onchange="handleCatChange(this,${idx})">
            ${catSelectHtml(a.cat)}
          </select>
          <input type="text" class="new-cat-inp" id="nci-${idx}" placeholder="New category name"
            onblur="handleNewCatBlur(this,${idx})" onkeydown="if(event.key==='Enter')this.blur()" style="display:none"/>
        </div>
        <div class="liq-wrap">
          <label class="liq-toggle">
            <input type="checkbox" ${a.liquid?'checked':''} onchange="toggleLiquid(${idx},this.checked)"/>
            <span class="liq-slider"></span>
          </label>
          <span>${a.liquid?'Yes':'No'}</span>
        </div>
        <button class="warn" id="archbtn-${idx}" onclick="archiveAccount(${idx})">Archive</button>
      </div>`;
    });
  }

  /* ── Archived accounts ── */
  if(archived.length>0){
    html+=`<div class="section-label" style="margin-top:24px">Archived accounts</div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">These accounts are hidden from Enter values. All history is fully preserved.</p>
    <div class="mgmt-header" style="border-radius:8px 8px 0 0"><span>Account name</span><span>Last value</span><span></span></div>`;
    archived.forEach((a,_)=>{
      const idx=accounts.indexOf(a);
      const lv=lastVal(a.name);
      html+=`<div class="mgmt-row archived-row" id="mgmt-${idx}">
        <span style="font-size:13px;color:var(--text2)">${esc(a.name)} <span class="badge badge-archived">archived</span></span>
        <span style="font-size:13px;font-family:var(--mono);color:var(--text2)">${fmt(lv)}</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="ghost" onclick="restoreAccount(${idx})">Restore</button>
          <button class="danger" id="permdelb-${idx}" onclick="permDelete(${idx})">Delete</button>
        </div>
      </div>`;
    });
    // close the list border on last archived row
    html+=`<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;height:0"></div>`;
  }

  /* ── Add new account ── */
  html+=`<div class="section-label" style="margin-top:24px">Add new account</div>
  <div class="add-form">
    <div class="add-row">
      <input type="text" id="new-name" placeholder="Account name" onkeydown="if(event.key==='Enter')addAccount()"/>
      <select id="new-cat-sel" onchange="toggleAddCat(this)">${catSelectHtml('')}</select>
    </div>
    <div id="add-new-cat-wrap" style="${noCats?'':'display:none'}">
      <input type="text" id="new-cat-name" placeholder="New category name" style="width:100%" onkeydown="if(event.key==='Enter')addAccount()"/>
    </div>
    <div><button class="primary" onclick="addAccount()">Add account</button></div>
  </div>`;

  el.innerHTML=html;
  if(noCats){const w=$('add-new-cat-wrap');if(w)w.style.display='block';}
}

function showMsg(html,ms=3500){
  const el=$('manage-msg');
  if(el){el.innerHTML=html;if(ms)setTimeout(()=>{const e=$('manage-msg');if(e)e.innerHTML='';},ms);}
}

/* ── Liquid toggle ── */
function toggleLiquid(idx,val){
  const acct=accounts[idx];if(!acct)return;
  acct.liquid=val;
  persistAccounts();
  // update the Yes/No label without full re-render
  const wrap=document.querySelector(`#mgmt-${idx} .liq-wrap span`);
  if(wrap)wrap.textContent=val?'Yes':'No';
}

/* ── Name edit (auto-save on blur) ── */
function handleNameBlur(inp){
  const idx=parseInt(inp.dataset.idx);
  const acct=accounts[idx];if(!acct)return;
  const newName=inp.value.trim();
  inp.style.borderColor='';
  if(!newName){inp.value=acct.name;return;}
  if(newName===acct.name)return;
  if(accounts.some((a,i)=>i!==idx&&a.name===newName)){
    inp.style.borderColor='var(--red)';
    showMsg(`<div class="msg err">"${esc(newName)}" already exists.</div>`,4000);
    inp.value=acct.name;return;
  }
  const old=acct.name;
  entries.forEach(e=>{if(old in e.values){e.values[newName]=e.values[old];delete e.values[old];}});
  acct.name=newName;
  persistAccounts();persist();fv={};
  showMsg(`<div class="msg ok">Renamed to "${esc(newName)}".</div>`);
}

/* ── Category edit (auto-save on change) ── */
function handleCatChange(sel,idx){
  const acct=accounts[idx];if(!acct)return;
  const nci=$('nci-'+idx);
  if(sel.value==='__new__'){if(nci)nci.style.display='block';return;}
  if(nci)nci.style.display='none';
  if(sel.value===acct.cat)return;
  acct.cat=sel.value;
  persistAccounts();fv={};
  showMsg(`<div class="msg ok">Category updated to "${esc(sel.value)}".</div>`);
  setTimeout(renderManage,500);
}
function handleNewCatBlur(inp,idx){
  const acct=accounts[idx];if(!acct)return;
  const cat=inp.value.trim();
  if(!cat)return;
  acct.cat=cat;
  persistAccounts();fv={};
  showMsg(`<div class="msg ok">Moved to "${esc(cat)}".</div>`);
  setTimeout(renderManage,500);
}
function toggleAddCat(sel){
  const w=$('add-new-cat-wrap');
  if(w)w.style.display=sel.value==='__new__'?'block':'none';
}

/* ── Archive ── */
function archiveAccount(idx){
  const btn=$('archbtn-'+idx);if(!btn)return;
  const acct=accounts[idx];if(!acct)return;
  const lv=lastVal(acct.name);

  if(archiveConfirm!==idx){
    archiveConfirm=idx;
    if(lv>0){
      btn.textContent=`Still shows ${fmt(lv)} — confirm archive?`;
      showMsg(`<div class="msg warn">This account has ${fmt(lv)} in your last entry. Archiving hides it from Enter values — future entries won't include it. Its past values remain in all history and totals.</div>`,6000);
    }else{
      btn.textContent='Confirm archive?';
    }
    setTimeout(()=>{archiveConfirm=null;const b=$('archbtn-'+idx);if(b)b.textContent='Archive';},5000);
    return;
  }
  acct.archived=true;
  archiveConfirm=null;
  persistAccounts();fv={};
  renderManage();
  showMsg(`<div class="msg ok">"${esc(acct.name)}" archived. All history preserved.</div>`);
}

/* ── Restore ── */
function restoreAccount(idx){
  const acct=accounts[idx];if(!acct)return;
  acct.archived=false;
  persistAccounts();fv={};
  renderManage();
  showMsg(`<div class="msg ok">"${esc(acct.name)}" restored to active accounts.</div>`);
}

/* ── Permanent delete (archived only) ── */
function permDelete(idx){
  const btn=$('permdelb-'+idx);if(!btn)return;
  const acct=accounts[idx];if(!acct)return;
  if(permDelConfirm!==idx){
    permDelConfirm=idx;
    btn.textContent='Confirm delete?';
    showMsg(`<div class="msg err">Permanent delete removes the account from your list. Its historical values will still count in your net worth totals but will no longer appear in any category breakdown.</div>`,6000);
    setTimeout(()=>{permDelConfirm=null;const b=$('permdelb-'+idx);if(b)b.textContent='Delete';},5000);
    return;
  }
  const name=acct.name;
  accounts.splice(idx,1);
  permDelConfirm=null;
  persistAccounts();fv={};
  renderManage();
  showMsg(`<div class="msg ok">"${esc(name)}" permanently removed.</div>`);
}

/* ── Add new account ── */
function addAccount(){
  const nameEl=$('new-name'),catSel=$('new-cat-sel'),ncEl=$('new-cat-name');
  const name=(nameEl?.value||'').trim();
  const catVal=catSel?.value||'';
  const cat=catVal==='__new__'?((ncEl?.value||'').trim()):catVal;
  if(nameEl)nameEl.style.borderColor='';
  if(ncEl)ncEl.style.borderColor='';
  if(!name){if(nameEl)nameEl.style.borderColor='var(--red)';return;}
  if(!cat){if(ncEl)ncEl.style.borderColor='var(--red)';return;}
  if(accounts.some(a=>a.name===name)){
    showMsg(`<div class="msg err">"${esc(name)}" already exists.</div>`,4000);return;
  }
  accounts.push({cat,name,archived:false,liquid:false});
  persistAccounts();fv={};
  renderManage();
  showMsg(`<div class="msg ok">"${esc(name)}" added to ${esc(cat)}.</div>`);
}

/* ─────────────────────────────────────────
   Shared actions
───────────────────────────────────────── */
function onInput(inp){
  fv[inp.dataset.acc]=parseFloat(inp.value)||0;
  const el=$('live-total');if(el)el.textContent=fmt(Object.values(fv).reduce((a,b)=>a+b,0));
}
function saveEntry(){
  const dateEl=$('edate');if(!dateEl||!dateEl.value)return;
  const values={};
  // Only save active accounts in new entries
  activeAccounts().forEach(a=>{values[a.name]=fv[a.name]||0;});
  entries.push({date:dateEl.value,values});
  entries.sort((a,b)=>a.date<b.date?-1:1);
  persist();fv={};switchTab('dashboard');
}
function delLast(){
  const btn=$('del-btn');if(!btn)return;
  if(!delEntryConfirm){
    delEntryConfirm=true;btn.textContent='Confirm delete?';
    setTimeout(()=>{delEntryConfirm=false;const b=$('del-btn');if(b)b.textContent='Delete last entry';},3000);
    return;
  }
  entries.pop();delEntryConfirm=false;persist();renderHist();
}

load();
renderDash();
</script>
</body>
</html>
